<!DOCTYPE html>
<html>
  <head>
    <title>Sierpinski Garden — Fractal Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="glCanvas"></canvas>
    <button id="menu-toggle" class="corner-btn" title="Transforms">☰</button>
    <button id="database-menu-toggle" class="corner-btn" title="Save / Load">💾</button>

    <div id="transform-gui" class="panel">
      <div class="panel-header">
        <h2>Transforms</h2>
        <a href="javascript:void(0)" id="closeToolbar" class="closeToolbar">×</a>
      </div>
      <div class="panel-body">
        <div id="transform-forms">
          <!-- Transform forms will be dynamically inserted here -->
        </div>
      </div>
      <div class="panel-footer">
        <button id="transition-matrix" class="btn">Transition Matrix</button>
        <button id="add-transform" class="btn btn-primary" title="Add transform">+</button>
      </div>
    </div>

    <div id="database-gui" class="panel">
      <div class="panel-header">
        <h2>Fractals</h2>
        <a href="javascript:void(0)" id="closeDatabaseToolbar" class="closeToolbar">×</a>
      </div>
      <div class="panel-body">
        <div class="db-section">
          <h3>Save current</h3>
          <div class="save-row">
            <input type="text" id="fractal-name" placeholder="Fractal name..." />
            <button id="save-fractal-btn" class="btn btn-primary">Save</button>
          </div>
        </div>
        <div class="db-section">
          <div class="load-header">
            <h3>Browse</h3>
            <div class="sort-toggle" id="sort-toggle">
              <button data-sort="popular" class="active">Popular</button>
              <button data-sort="recent">Recent</button>
            </div>
          </div>
          <div id="fractal-list">
            <!-- Fractal list will be populated here -->
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gl-matrix@2.4.0/dist/gl-matrix-min.js"></script>
    <script type="module" src="./gui/toggle_toolbar.js"></script>
    <script type="module" src="./gui/database_gui.js"></script>
    <script type="module" src="./gui/handles.js"></script>
    <script type="module" src="./gui/transforms_form.js"></script>
    <script type="module" src="./gui/transition_matrix.js"></script>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
